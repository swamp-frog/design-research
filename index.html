<title>Dual Video Loop Player</title>

<style>

    background:white;
    display:flex;

    top: 0%;
    left:0%;
    width:100%;
    text-align:center;

    font-family: monospace;
    display:none; /* 👈 add this */
}

    display:none; /* keep ONLY this initially */

    margin-top:0px;
    gap:20px;
    align-items: flex-start;
    height: 120px;

.counter-box{
    width:50%;
    display:flex;
    /* justify-content:space-between; */

// ---------------- ELEMENT ----------------
const wordTickerEl = document.getElementById("wordTicker");
const wordTickerWrapper = document.querySelector(".word-ticker-wrapper");
wordTickerEl.textContent = "achievements:\n\n";
// ---------------- STATE ----------------
const wordCounters = wordSchedule.map(w => 0); // track seconds for each word

// ---------------- UPDATE FUNCTION ----------------
let renderedCounts = wordSchedule.map(() => 0); // track how many already printed



function updateWords() {
    // Increment all counters by 1 second
    wordCounters.forEach((_, i) => wordCounters[i]++);

    let added = true;

    // Keep adding words in chronological order while there are any ready
    while (added) {
        added = false;

        // Find the next word(s) that should appear
        let nextWordIndex = -1;
        let minNextTime = Infinity;

        wordSchedule.forEach((item, i) => {
            const nextTime = (renderedCounts[i] + 1) * item.interval;
            if (wordCounters[i] >= nextTime && nextTime < minNextTime) {
                minNextTime = nextTime;
                nextWordIndex = i;
            }
        });

        // If a word is due, add it
        if (nextWordIndex >= 0) {
            wordTickerEl.textContent += wordSchedule[nextWordIndex].word + " ";
            renderedCounts[nextWordIndex]++;
            added = true; // check again in case multiple words are due at the same time
        }
    }
}



// ---------------- TICKER LOOP ----------------
let tickerInterval = null;

function startWordTicker() {
    tickerInterval = setInterval(updateWords, 1000);
}

// ---------------- TOTAL TIME ----------------
function getTotalSeconds(playlist){
    return playlist.reduce((sum, item) => sum + item.loops, 0);
}

// use the LONGER playlist as master duration
const totalSeconds = Math.max(
    getTotalSeconds(leftPlaylist) * 13347,
    getTotalSeconds(rightPlaylist)
);

// ---------------- GENERIC PLAYER ----------------
function createLooper(videoEl, playlist, playlistRepeats = 1, onLoop = null){

    let index = 0;
    let loop = 0;
    let playlistCount = 0;

    function playNext(){
        videoEl.src = playlist[index].src;
        videoEl.currentTime = 0;
        videoEl.play().catch(()=>{});
    }

    videoEl.onended = () => {
        loop++;

        // still looping same clip
        if(loop < playlist[index].loops){
            videoEl.currentTime = 0;
            videoEl.play().catch(()=>{});

            if(onLoop) onLoop();
            return;
        }

        // finished full clip
        loop = 0;
        index++;

        if(index >= playlist.length){
            index = 0;
            playlistCount++;

            if(playlistCount >= playlistRepeats){
                return;
            }
        }

        playNext();
    };

    return {
        start: () => playNext()
    };
}

// ---------------- CREATE PLAYERS ----------------

    leftVideo,
    leftPlaylist,
    13347,
    () => {
        currentMeters++;
        updateMeters();
